name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  ci:
    name: Lint · Typecheck · Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build engine
        run: npm run build --workspace=packages/engine

      - name: Typecheck (all packages)
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Test (all packages)
        run: npm run test --workspaces

      - name: Upload coverage — engine
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-engine
          path: packages/engine/coverage/
          if-no-files-found: ignore

      - name: Upload coverage — server
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-server
          path: packages/server/coverage/
          if-no-files-found: ignore
